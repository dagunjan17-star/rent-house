name: Auto Sync to project repos

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      # Existing Repo
      - name: Sync to Rent House Repo
        continue-on-error: true
        run: |
          git remote remove mirror || true

          git remote add mirror https://x-access-token:${{ secrets.GURGAON_ACCESS_TOKEN }}@github.com/dealacresGurgaon/Rent-House.git

          git push mirror HEAD:main --force

      # New Frontend Repo
      - name: Sync to Gurgaon Rent House Frontend
        continue-on-error: true
        run: |
          git remote remove frontend || true

          git remote add frontend https://x-access-token:${{ secrets.GURGAON_PROJECTS_ACCESS_TOKEN }}@github.com/mukeshkumar44/gurgaon-rent-house-frontend.git

          git push frontend HEAD:main --force